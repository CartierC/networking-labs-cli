name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    name: Lint and Shell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Lint — Python errors only
        run: flake8 nmcli/ main.py --max-line-length=100 --select=E9,F63,F7,F82

      - name: Shell syntax check
        run: bash -n scripts/net-diag.sh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install boto3 botocore pytest
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v
